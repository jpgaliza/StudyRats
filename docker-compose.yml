services:

  # ─── Laravel API ───────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studyrats_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    networks:
      - studyrats_network
    depends_on:
      - mysql
      - redis

  # ─── Nginx ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: studyrats_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - studyrats_network
    depends_on:
      - app

  # ─── Frontend (React + Vite) ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: studyrats_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Evita que o node_modules do host sobrescreva o do container
      - /app/node_modules
    networks:
      - studyrats_network
    depends_on:
      - nginx
    environment:
      - CHOKIDAR_USEPOLLING=true

  # ─── MySQL ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: studyrats_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: studyrats
      MYSQL_USER: studyrats_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3306:3306"
    volumes:
      - studyrats_mysql_data:/var/lib/mysql
    networks:
      - studyrats_network

  # ─── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: studyrats_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - studyrats_network

  # ─── phpMyAdmin ────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: studyrats_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: studyrats_user
      PMA_PASSWORD: secret
    networks:
      - studyrats_network
    depends_on:
      - mysql

networks:
  studyrats_network:
    driver: bridge

volumes:
  studyrats_mysql_data: